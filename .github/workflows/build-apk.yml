name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3 python3-dev libffi-dev libssl-dev libgdk-pixbuf2.0-dev libmpc-dev libmpfr-dev libgmp-dev autoconf libtool pkg-config libgl1-mesa-dev libglew-dev libosmesa6-dev patchelf
        pip install buildozer cython
    
    - name: Copy main file
      run: cp main_kivy_phone.py main.py
    
    - name: Build APK
      run: buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: password-manager-apk
        path: bin/*.apk
